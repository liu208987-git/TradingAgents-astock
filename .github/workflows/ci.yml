name: CI

on:
  push:
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml

      - name: Compile Python files
        run: |
          python -m py_compile scripts/run_stock_analysis_snapshot.py
          python -m py_compile scripts/render_unified_html.py
          python -m py_compile scripts/run_full_report.py
          python -m py_compile scripts/test_unified_pipeline.py
          python -m py_compile tradingagents/dataflows/pipeline_config.py

      - name: Validate pyproject.toml
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb')); print('toml ok')"

      - name: Validate example config
        run: python -c "import yaml; yaml.safe_load(open('config/unified_pipeline.example.yaml', encoding='utf-8')); print('yaml ok')"

      - name: Check for hardcoded local paths
        run: |
          if grep -rE "C:/Users/liu|C:\\\\Users\\\\liu|E:/python|E:\\\\python" scripts/ tradingagents/ config/ README.md UNIFIED_PIPELINE.md pyproject.toml; then
            echo "ERROR: Found hardcoded local paths"
            exit 1
          fi
          echo "No hardcoded paths found"
